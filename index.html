<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的脚本库 - Google Apps Script 风格</title>
    <style>
        :root {
            --google-blue: #1a73e8;
            --sidebar-bg: #f8f9fa;
            --code-bg: #ffffff; /* 现代代码编辑器多用浅色 */
            --text-color: #3c4043;
            --border-color: #dadce0;
        }
        body { display: flex; margin: 0; font-family: 'Roboto', 'Noto Sans SC', sans-serif; height: 100vh; color: var(--text-color); font-size: 14px; overflow: hidden; }
        
        /* 1. 最左侧图标栏 */
        #icon-bar { width: 48px; background-color: #ffffff; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding-top: 10px; }
        .icon-item { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; cursor: pointer; color: #5f6368; }
        .icon-item:hover { background-color: #f1f3f4; color: var(--google-blue); }
        .icon-item.active { background-color: #e8f0fe; color: var(--google-blue); }

        /* 2. 文件列表栏 */
        #file-sidebar { width: 220px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        #file-header { padding: 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        #file-header h3 { margin: 0; font-size: 14px; font-weight: 500; }
        #file-list { flex: 1; overflow-y: auto; padding-top: 8px; }
        .file-item { padding: 6px 16px 6px 32px; cursor: pointer; position: relative; display: flex; align-items: center; color: #202124; }
        .file-item:hover { background-color: #e8f0fe; }
        .file-item.active { background-color: #e8f0fe; color: var(--google-blue); font-weight: 500; }
        .file-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background-color: var(--google-blue); border-top-right-radius: 4px; border-bottom-right-radius: 4px; }
        .file-icon { margin-right: 8px; font-size: 16px; opacity: 0.7; }

        /* 3. 右侧代码主区域 */
        #main-content { flex: 1; display: flex; flex-direction: column; background-color: var(--code-bg); }
        #code-header { height: 48px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 16px; background-color: #ffffff; }
        #code-header h2 { margin: 0; font-size: 16px; font-weight: 400; }
        #code-container { flex: 1; overflow: auto; padding: 0; position: relative; }
        
        /* 代码显示样式 - 使用 Google 风格的浅色语法高亮 */
        pre { margin: 0; padding: 16px; font-family: 'Roboto Mono', monospace; font-size: 13px; line-height: 1.5; tab-size: 2; color: #3c4043; }
        .pl-k { color: #d73a49; } /* 关键字 */
        .pl-s { color: #183691; } /* 字符串 */
        .pl-c { color: #6a737d; } /* 注释 */
        .pl-en { color: #6f42c1; } /* 函数名 */
        .pl-v { color: #e36209; } /* 变量 */

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Roboto+Mono&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <div id="icon-bar">
        <div class="icon-item" title="项目概览"><span class="material-icons">info</span></div>
        <div class="icon-item active" title="编辑器"><span class="material-icons">code</span></div>
        <div class="icon-item" title="触发器"><span class="material-icons">schedule</span></div>
        <div class="icon-item" title="执行"><span class="material-icons">playlist_play</span></div>
        <div class="icon-item" title="设置"><span class="material-icons">settings</span></div>
    </div>

    <div id="file-sidebar">
        <div id="file-header">
            <h3>文件</h3>
            <span class="material-icons" style="font-size: 18px; color: #5f6368; cursor: pointer;">add</span>
        </div>
        <div id="file-list">
            </div>
    </div>

    <div id="main-content">
        <div id="code-header">
            <h2 id="current-file-name">请选择文件</h2>
        </div>
        <div id="code-container">
            <pre id="code-display"><span class="pl-c">// 你的脚本代码库</span>
<span class="pl-c">// 点击左侧文件查看代码...</span></pre>
        </div>
    </div>

<script>
        // ⬇️ 以后你只需要在这里添加或修改你的脚本 ⬇️
        const scriptLibrary = {
            'clearAK.gs': {
                icon: 'description', // 图标名称
                code: `function clearTreeSheetsOnly() {
  var spreadsheet = SpreadsheetApp.getActiveSpreadsheet();
  var sheets = spreadsheet.getSheets();
  
  // 循环检查每一个分页
  for (var i = 0; i < sheets.length; i++) {
    var sheet = sheets[i];
    var sheetName = sheet.getName();
    
    // 只有名字以 🌴 开头的分页才处理
    if (sheetName.startsWith("🌴")) {
      // 这里粘贴你具体的逻辑代码
    }
  }
}`
            },
            '自动修复.gs': {
                icon: 'build',
                code: `function autoRepair() {
  console.log("正在修复...");
  // 把你的代码直接粘贴到这两个反引号之间
}`
            },
            '我的新脚本.gs': {
                icon: 'code',
                code: `// 在这里粘贴你的第三个脚本...`
            }
        };
        // ⬆️ 修改区域结束 ⬆️


        // 下面是网页的运行逻辑，不需要修改
        const fileListParams = document.getElementById('file-list');
        const codeDisplayParams = document.getElementById('code-display');
        const currentFileNameParams = document.getElementById('current-file-name');

        function initFileList() {
            fileListParams.innerHTML = ''; 
            Object.keys(scriptLibrary).forEach((fileName, index) => {
                const fileData = scriptLibrary[fileName];
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.onclick = () => loadCode(fileName);
                fileItem.innerHTML = '<span class="material-icons file-icon">' + fileData.icon + '</span>' + fileName;
                fileListParams.appendChild(fileItem);
                
                if (index === 0) loadCode(fileName);
            });
        }

        function loadCode(fileName) {
            currentFileNameParams.innerText = fileName;
            // 使用 textContent 确保你粘贴的任何代码都能原样显示，不会错乱
            codeDisplayParams.textContent = scriptLibrary[fileName].code;
            
            const allItems = document.querySelectorAll('.file-item');
            allItems.forEach(item => item.classList.remove('active'));
            Array.from(allItems).find(item => item.innerText.includes(fileName)).classList.add('active');
        }

        initFileList();
    </script>
