<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的脚本库 - Google Apps Script 风格</title>
    <style>
        :root {
            --google-blue: #1a73e8;
            --sidebar-bg: #f8f9fa;
            --code-bg: #ffffff;
            --text-color: #3c4043;
            --border-color: #dadce0;
        }
        body { display: flex; margin: 0; font-family: 'Roboto', 'Noto Sans SC', sans-serif; height: 100vh; color: var(--text-color); font-size: 14px; overflow: hidden; }
        
        /* 1. 最左侧图标栏 */
        #icon-bar { width: 48px; background-color: #ffffff; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding-top: 10px; }
        .icon-item { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; cursor: pointer; color: #5f6368; }
        .icon-item:hover { background-color: #f1f3f4; color: var(--google-blue); }
        .icon-item.active { background-color: #e8f0fe; color: var(--google-blue); }

        /* 2. 文件列表栏 */
        #file-sidebar { width: 220px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        #file-header { padding: 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        #file-header h3 { margin: 0; font-size: 14px; font-weight: 500; }
        #file-list { flex: 1; overflow-y: auto; padding-top: 8px; }
        .file-item { padding: 6px 16px 6px 32px; cursor: pointer; position: relative; display: flex; align-items: center; color: #202124; }
        .file-item:hover { background-color: #e8f0fe; }
        .file-item.active { background-color: #e8f0fe; color: var(--google-blue); font-weight: 500; }
        .file-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background-color: var(--google-blue); border-top-right-radius: 4px; border-bottom-right-radius: 4px; }
        .file-icon { margin-right: 8px; font-size: 16px; opacity: 0.7; }

        /* 3. 右侧代码主区域 */
        #main-content { flex: 1; display: flex; flex-direction: column; background-color: var(--code-bg); }
        
        /* 修改了头部布局，让按钮靠右对齐 */
        #code-header { height: 48px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 16px; background-color: #ffffff; }
        #code-header h2 { margin: 0; font-size: 16px; font-weight: 400; }
        
        /* 新增：一键复制按钮样式 */
        .copy-btn { background-color: #ffffff; border: 1px solid var(--border-color); border-radius: 4px; color: var(--text-color); padding: 6px 12px; cursor: pointer; display: flex; align-items: center; font-size: 13px; font-weight: 500; transition: background-color 0.2s; outline: none; }
        .copy-btn:hover { background-color: #f1f3f4; }
        .copy-btn .material-icons { font-size: 16px; margin-right: 6px; }

        #code-container { flex: 1; overflow: auto; padding: 0; position: relative; }
        
        /* 代码显示样式 */
        pre { margin: 0; padding: 16px; font-family: 'Roboto Mono', monospace; font-size: 13px; line-height: 1.5; tab-size: 2; color: #3c4043; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Roboto+Mono&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <div id="icon-bar">
        <div class="icon-item" title="项目概览"><span class="material-icons">info</span></div>
        <div class="icon-item active" title="编辑器"><span class="material-icons">code</span></div>
        <div class="icon-item" title="触发器"><span class="material-icons">schedule</span></div>
        <div class="icon-item" title="执行"><span class="material-icons">playlist_play</span></div>
        <div class="icon-item" title="设置"><span class="material-icons">settings</span></div>
    </div>

    <div id="file-sidebar">
        <div id="file-header">
            <h3>文件</h3>
            <span class="material-icons" style="font-size: 18px; color: #5f6368; cursor: pointer;">add</span>
        </div>
        <div id="file-list">
            </div>
    </div>

    <div id="main-content">
        <div id="code-header">
            <h2 id="current-file-name">请选择文件</h2>
            <button class="copy-btn" id="copy-button" onclick="copyCode()">
                <span class="material-icons" id="copy-icon">content_copy</span>
                <span id="copy-text">复制代码</span>
            </button>
        </div>
        <div id="code-container">
            <pre id="code-display">// 你的脚本代码库
// 点击左侧文件查看代码...</pre>
        </div>
    </div>

    <script>
        // ⬇️ 你的脚本代码库 ⬇️
        const scriptLibrary = {
            '自动删除列.gs': {
                icon: 'delete_sweep', // 扫把图标，代表清理
                code: `function 自动删除多余列() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const sheets = ss.getSheets();
  const maxColumnLetter = 'CB'; // 从这里修改保留到哪一列

  const maxColumns = 列字母转数字(maxColumnLetter);

  sheets.forEach(sheet => {
    if (!sheet.getName().startsWith('🌳')) return;

    const lastColumn = sheet.getMaxColumns();

    if (lastColumn > maxColumns) {
      const deleteCount = lastColumn - maxColumns;
      sheet.deleteColumns(maxColumns + 1, deleteCount);
    }
  });
}

function 列字母转数字(columnLetter) {
  let columnNumber = 0;
  const letters = columnLetter.toUpperCase();

  for (let i = 0; i < letters.length; i++) {
    columnNumber = columnNumber * 26 + (letters.charCodeAt(i) - 64);
  }

  return columnNumber;
}`
},
'🔒 记录锁定脚本（自动解锁版）.gs': {
                icon: 'code',  // 随便选个图标，比如 code (代码), build (扳手), description (文档)
                code: `function myNewScript() {
  console.log("/**
 * 🔒 记录锁定脚本（自动解锁版）
 * 功能：
 * 1. 自定义菜单：锁定/解除锁定 BI5:BI350
 * 2. 即时反馈提示（toast + alert）
 * 3. 优化保护操作性能
 * 4. ⭐ 新增：锁定后自定义分钟自动解锁，防止忘记解锁
 */

// ============================================
// ⭐ 自动解锁时间设置（分钟），可按需修改
// ============================================
var AUTO_UNLOCK_MINUTES = 20;


// 1️⃣ 创建自定义菜单
function addLockColumnMenu() {
  var ui = SpreadsheetApp.getUi();
  
  ui.createMenu("🔒记录锁定")
    .addItem("🔒记录锁定", "lockColumnBI") 
    .addItem("💡解除锁定", "unlockColumnBI_Menu")
    .addToUi();
}

function onInstall(e) {
  addLockColumnMenu();
}

// ✅ 菜单点击时走这里
function unlockColumnBI_Menu() {
  unlockColumnBI(true);
}


// 2️⃣ 锁定函数（BI5:BI350）— ⭐ 已加入自动解锁触发器
function lockColumnBI() {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var ui = SpreadsheetApp.getUi();
  var sheet = ss.getActiveSheet();
  var targetA1 = "BI5:BI350";
  var range = sheet.getRange(targetA1);

  var allowedEditors = [
    "lihzi20181217@gmail.com",
    "wulinda123456@gmail.com",
    "zhix274@gmail.com",
    "lisataylor0200@gmail.com"
  ];
  var me = Session.getEffectiveUser().getEmail();
  if (allowedEditors.indexOf(me) === -1) allowedEditors.push(me);

  try {
    ss.toast("🔒 正在锁定 BI 列…");
    SpreadsheetApp.flush();

    // 查找已有保护
    var protections = sheet.getProtections(SpreadsheetApp.ProtectionType.RANGE);
    var protection = null;
    for (var i = 0; i < protections.length; i++) {
      try {
        var pRange = protections[i].getRange();
        if (pRange && pRange.getA1Notation() === targetA1) {
          protection = protections[i];
          break;
        }
      } catch (e) {}
    }

    if (!protection) {
      protection = range.protect().setDescription("LOCK_BI_5_350");
    } else {
      protection.setDescription("LOCK_BI_5_350");
    }

    // 优化：仅在编辑者变化时更新
    var currentEditors = normalizeEditors(protection.getEditors ? protection.getEditors() : []);
    var same = allowedEditors.length === currentEditors.length &&
               allowedEditors.every(function(e){ return currentEditors.indexOf(e) !== -1; });

    if (!same) {
      try { protection.removeEditors(protection.getEditors()); } catch(e){}
      protection.addEditors(allowedEditors);
    }

    if (protection.canDomainEdit && protection.canDomainEdit()) {
      protection.setDomainEdit(false);
    }

    // ============================================
    // ⭐ 新增：设置自动解锁触发器
    // ============================================
    clearAutoUnlockTriggers();  // 先清除之前的触发器（防止重复）
    
    ScriptApp.newTrigger('autoUnlockBI')
      .timeBased()
      .after(AUTO_UNLOCK_MINUTES * 60 * 1000)  // 转换为毫秒
      .create();
    
    // 记录锁定信息（方便追踪是谁锁的）
    var props = PropertiesService.getScriptProperties();
    props.setProperty('lockedBy', me);
    props.setProperty('lockedAt', new Date().toISOString());
    props.setProperty('lockedSheet', sheet.getName());
    // ============================================

    ss.toast("✅ 已锁定 BI 列！" + AUTO_UNLOCK_MINUTES + "分钟后将自动解锁", "提示", 5);

  } catch (err) {
    ui.alert("❌ 锁定失败: " + err.message);
  }
}


// 3️⃣ 解锁函数（整列 BI）— ⭐ 已加入清除触发器逻辑
function unlockColumnBI(fromMenu) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var ui = SpreadsheetApp.getUi();
  var sheet = ss.getActiveSheet();

  try {
    ss.toast("🔓 正在解除 BI 列锁定…");
    SpreadsheetApp.flush();

    var protections = sheet.getProtections(SpreadsheetApp.ProtectionType.RANGE);
    var found = false;

    for (var i = 0; i < protections.length; i++) {
      try {
        var pRange = protections[i].getRange();
        if (pRange && pRange.getColumn() === 61) {
          protections[i].remove();
          found = true;
        }
      } catch (e) {}
    }

    // ============================================
    // ⭐ 新增：手动解锁时，清除自动解锁触发器
    // ============================================
    clearAutoUnlockTriggers();
    
    // 清除锁定记录
    var props = PropertiesService.getScriptProperties();
    props.deleteProperty('lockedBy');
    props.deleteProperty('lockedAt');
    props.deleteProperty('lockedSheet');
    // ============================================

    if (fromMenu) {
      ui.alert(found ? "✅ BI列权限已解除，所有用户可以编辑！"
                     : "⚠️ 没有发现 BI 列的保护区域。");
    } else {
      ss.toast(found ? "✅ BI列权限已解除！" : "⚠️ 没有发现 BI 列的保护区域。", "提示", 3);
      Logger.log(found ? "✅ BI列权限已解除" : "⚠️ 没有发现 BI 列的保护区域");
    }

  } catch (err) {
    ui.alert("❌ 解锁失败: " + err.message);
  }
}


// ============================================
// ⭐ 新增函数：自动解锁（由触发器调用）
// ============================================
function autoUnlockBI() {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var props = PropertiesService.getScriptProperties();
  var lockedSheet = props.getProperty('lockedSheet');
  
  // 尝试找到锁定时的工作表
  var sheet;
  if (lockedSheet) {
    sheet = ss.getSheetByName(lockedSheet);
  }
  if (!sheet) {
    sheet = ss.getActiveSheet();
  }

  // 解除该工作表上 BI 列的所有保护
  var protections = sheet.getProtections(SpreadsheetApp.ProtectionType.RANGE);
  var found = false;
  for (var i = 0; i < protections.length; i++) {
    try {
      var pRange = protections[i].getRange();
      if (pRange && pRange.getColumn() === 61) {
        protections[i].remove();
        found = true;
      }
    } catch (e) {}
  }

  // 清理
  clearAutoUnlockTriggers();
  props.deleteProperty('lockedBy');
  props.deleteProperty('lockedAt');
  props.deleteProperty('lockedSheet');

  Logger.log("⏰ 自动解锁已执行 - 工作表: " + (lockedSheet || "未知") + ", 结果: " + (found ? "成功" : "未找到保护"));
}


// ============================================
// ⭐ 新增函数：清除所有自动解锁触发器
// ============================================
function clearAutoUnlockTriggers() {
  var triggers = ScriptApp.getProjectTriggers();
  for (var i = 0; i < triggers.length; i++) {
    if (triggers[i].getHandlerFunction() === 'autoUnlockBI') {
      ScriptApp.deleteTrigger(triggers[i]);
    }
  }
}


// 5️⃣ 辅助函数：把 protection.getEditors() 规范成 email 字符串数组
function normalizeEditors(arr) {
  if (!arr) return [];
  return arr.map(function(u) {
    if (!u) return "";
    if (typeof u === "string") return u;
    if (typeof u.getEmail === "function") {
      try { return u.getEmail(); } catch (e) { return String(u); }
    }
    if (u.email) return u.email;
    return String(u);
  }).filter(function(x){ return x; });
}


/**
 * 解除当前电子表格中所有工作表的 BI 列保护（不重建）
 */
function unprotectBIColumnAcrossAllSheets() {
  var SS = SpreadsheetApp.getActiveSpreadsheet();
  var sheets = SS.getSheets();
  var BI_COL = 61;

  sheets.forEach(function(sheet) {
    var sheetName = sheet.getName();

    var rangeProtections = sheet.getProtections(SpreadsheetApp.ProtectionType.RANGE);
    rangeProtections.forEach(function(prot) {
      var rng = prot.getRange();
      if (!rng) return;
      var startCol = rng.getColumn();
      var endCol = startCol + rng.getNumColumns() - 1;

      if (startCol <= BI_COL && BI_COL <= endCol) {
        prot.remove();
        Logger.log("已移除范围保护: " + sheetName + " - " + rng.getA1Notation());
      }
    });

    var sheetProtections = sheet.getProtections(SpreadsheetApp.ProtectionType.SHEET);
    sheetProtections.forEach(function(sProt) {
      var unprotected = sProt.getUnprotectedRanges();
      var biRange = sheet.getRange("BI:BI");
      var alreadyThere = unprotected.some(r => r.getA1Notation() === biRange.getA1Notation());
      if (!alreadyThere) {
        unprotected.push(biRange);
        sProt.setUnprotectedRanges(unprotected);
        Logger.log("已在整表保护中解除 BI 列: " + sheetName);
      }
    });

  });

  SpreadsheetApp.flush();
  Logger.log("所有工作表的 BI 列保护已解除。");
}");
  // 把你的新代码直接粘贴到这两个反引号之间
}`
            
            }
        };
        // ⬆️ 修改区域结束 ⬆️

        // 下面是网页的运行逻辑，不需要修改
        const fileListParams = document.getElementById('file-list');
        const codeDisplayParams = document.getElementById('code-display');
        const currentFileNameParams = document.getElementById('current-file-name');

        function initFileList() {
            fileListParams.innerHTML = ''; 
            Object.keys(scriptLibrary).forEach((fileName, index) => {
                const fileData = scriptLibrary[fileName];
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.onclick = () => loadCode(fileName);
                fileItem.innerHTML = '<span class="material-icons file-icon">' + fileData.icon + '</span>' + fileName;
                fileListParams.appendChild(fileItem);
                
                if (index === 0) loadCode(fileName);
            });
        }

        function loadCode(fileName) {
            currentFileNameParams.innerText = fileName;
            codeDisplayParams.textContent = scriptLibrary[fileName].code;
            
            const allItems = document.querySelectorAll('.file-item');
            allItems.forEach(item => item.classList.remove('active'));
            Array.from(allItems).find(item => item.innerText.includes(fileName)).classList.add('active');
        }

        // 新增：一键复制代码功能
        function copyCode() {
            const codeToCopy = codeDisplayParams.textContent;
            navigator.clipboard.writeText(codeToCopy).then(() => {
                const copyIcon = document.getElementById('copy-icon');
                const copyText = document.getElementById('copy-text');
                
                // 变成成功状态：打勾图标，绿色文字
                copyIcon.innerText = 'check';
                copyIcon.style.color = '#1e8e3e';
                copyText.innerText = '已复制!';
                copyText.style.color = '#1e8e3e';
                
                // 2秒后恢复原样
                setTimeout(() => {
                    copyIcon.innerText = 'content_copy';
                    copyIcon.style.color = '';
                    copyText.innerText = '复制代码';
                    copyText.style.color = '';
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
                alert('复制失败，请手动选择复制。');
            });
        }

        initFileList();
    </script>
</body>
</html>
